# This file tells Render how to deploy your entire application
services:
  # Backend API Service
  - type: web
    name: nesttech-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # You'll add this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render will create a secure random value
      - key: CORS_ORIGIN
        sync: false  # Will add after frontend deploys
      - key: PORT
        value: 5000